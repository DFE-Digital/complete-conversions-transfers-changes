services:        
   complete.sqldb:
    image: mcr.microsoft.com/azure-sql-edge:latest@sha256:902628a8be89e35dfb7895ca31d602974c7bafde4d583a0d0873844feb1c42cf
    environment:
      ACCEPT_EULA: Y
      MSSQL_SA_PASSWORD: ${DATABASE_PASSWORD}
    ports:
      - "1433:1433"
    networks:
      - local-dev
    healthcheck:
      test: /opt/mssql-tools/bin/sqlcmd -S 127.0.0.1 -U sa -P ${DATABASE_PASSWORD} -C -Q 'SELECT 1' || exit 1
      interval: 2s
      retries: 10
    restart: always
    
   completeDb.configurator:
    image: mcr.microsoft.com/mssql/server:2022-latest@sha256:e07b9699a2b749969f19d86563ceeea22bd3a69f7f1db85a8d1ac4bdaf0c6f56
    volumes:
      - ./init:/initdb.d
    networks:
      - local-dev
    depends_on:
      complete.sqldb:
        condition: service_healthy
    command: >
      bash -c '
      /opt/mssql-tools18/bin/sqlcmd -S complete.sqldb -U sa -P ${DATABASE_PASSWORD} -C -d master -i initdb.d/init-sqldatabase.sql;
      echo "All done!";
      '

   complete.redis:
    container_name: complete.redis
    image: redis:latest@sha256:0c341492924cad6f5483f9133e43bd6c51ecdecbcadfac5b51657393b6a7936c
    restart: always
    ports:
     - "6379:6379"
    networks:
      - local-dev

networks:
  local-dev:
    
