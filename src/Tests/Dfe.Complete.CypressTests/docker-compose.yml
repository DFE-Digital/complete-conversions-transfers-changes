version: "3.8"
services:
    zap:
        container_name: zap
        image: ghcr.io/zaproxy/zaproxy:stable@sha256:8d387b1a63e3425beef4846e39719f5af2a787753af2d8b6558c6257d7a577a2
        command: "zap.sh -daemon -port 8080 -host 0.0.0.0 -config api.key=${ZAP_API_KEY} -config api.addrs.addr.name=.* -config api.addrs.addr.regex=true -config network.localServers.mainProxy.alpn.enabled=false -config network.localServers.mainProxy.address=0.0.0.0"
        user: zap
        volumes:
            -   ./zap-reports:/zap/wrk:rw
    cypress:
        build:
            context: ./
            dockerfile: Dockerfile
        command: -- --env username=${USERNAME},url=${URL},api=${API},authKey=${AUTH_KEY},tenantId=${TENANT_ID},clientId=${CLIENT_ID},clientSecret=${CLIENT_SECRET},completeApiClientId=${COMPLETE_API_CLIENT_ID},zapReport=true,zapApiKey=${ZAP_API_KEY},zapUrl=${HTTP_PROXY}
        depends_on:
            zap:
                condition: service_healthy
        environment:
            - HTTP_PROXY=${HTTP_PROXY}
            - NO_PROXY=${NO_PROXY}
            - NODE_OPTIONS=--max-old-space-size=8192
        volumes:
            - ./:/reports:rw
